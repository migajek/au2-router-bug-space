<section class="card border-success-subtle shadow-sm">
  <div class="card-body">
    <h3 class="h5 mb-3">Device <span class="text-success">${device}</span></h3>

    <p class="lead mb-2">
      This device ${isProblematicDevice ? 'contains' : 'doesnt contain'} a space in the ID.
    </p>
    <p class="text-body-secondary mb-0">
      Since this is the top-level (root) router, nothing breaks regardless of spaces in the ID.
      You can press <kbd>F5</kbd> and observe the URL bar staying stable.
    </p>
  </div>
</section>
